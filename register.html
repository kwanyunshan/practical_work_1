<section class="content">

<h3>Booking Form</h3>

<form class="form">

    <table class="tableForm">

        <tr>
            <td>Name :</td>
            <td>
                <input type="text" name="name" required placeholder="Enter your name">
            </td>
        </tr>
        <tr>
            <td>IC Number :</td>
            <td>
                <input type="number" name="ic number" required placeholder="xxxxxx-xx-xxxx">
            </td>
        </tr>

        <tr>
            <td>Age :</td>
            <td>
                <input type="number" name="age" required placeholder="Enter your age">
            </td>
        </tr>

        <tr>
            <td>Gender :</td>
            <td>
                <label class="radio-item">
                    <input type="radio" name="gender" value="Male" required>
                    Male
                </label>

                <label class="radio-item">
                    <input type="radio" name="gender" value="Female">
                    Female
                </label>
            </td>
        </tr>

        <tr>
            <td>Email :</td>
            <td>
                <input type="email" name="email" required placeholder="xxxx@gmail.com">
            </td>
        </tr>

        <tr>
            <td>Phone Number :</td>
            <td>
                <input type="number" name="phone number" required placeholder="+60 123456789">
            </td>
        </tr>

        <tr>
            <td>Competition :</td>
            <td>
                <select name="competition" required>
                    <option value="">--Select--</option>
                    <option>Drone Competition</option>
                    <option>AI Robotics</option>
                    <option>Code Design</option>
                    <option>Cooking</option>
                    <option>3D Art</option>
                </select>
            </td>
        </tr>
    </table>

<br>
<br>
        <button class="button" type="submit">Submit</button>
  
</form>
